<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Insights — Growth Darji</title>
<meta name="description" content="Field notes on positioning, retention, and building consumer brands people return to.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#F4F2EE; --charcoal:#0E0E0E; --graphite:#555;
    --em:#0F5B4F; --em2:#1a7a6a; --saffron:#D6A24A;
    --stone:#DDD9D2; --cream:#F8F6F2;
    --serif:'DM Serif Display',Georgia,serif;
    --sans:'Instrument Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--cream);color:var(--charcoal);font-family:var(--sans);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:inherit}

  /* top bar */
  .topnav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:1.1rem 6%;background:rgba(248,246,242,.85);backdrop-filter:blur(18px);border-bottom:1px solid var(--stone)}
  .wordmark{font-family:var(--serif);font-size:1.25rem;letter-spacing:.01em;text-decoration:none;color:var(--charcoal)}
  .backlink{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;text-decoration:none;color:var(--graphite);transition:color .2s}
  .backlink:hover{color:var(--em)}

  .wrap{max-width:1120px;margin:0 auto;padding:0 6%}

  /* hero */
  .ihero{padding:5.5rem 0 1rem}
  .eyebrow{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--em);font-weight:600}
  .ititle{font-family:var(--serif);font-size:clamp(2.4rem,6vw,4rem);line-height:1.05;margin:1rem 0 0}
  .ititle em{font-style:italic;color:var(--em)}
  .iintro{margin-top:1.2rem;max-width:560px;color:var(--graphite);font-size:1rem;line-height:1.75}

  /* filter chips */
  .chips{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:2.5rem;align-items:center}
  .chip{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;
    padding:.55rem 1.05rem;border:1px solid var(--stone);border-radius:100px;background:#fff;color:var(--graphite);
    cursor:pointer;transition:background .25s,color .25s,border-color .25s}
  .chip:hover{border-color:var(--em);color:var(--em)}
  .chip.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
  .count{font-size:.72rem;letter-spacing:.05em;color:var(--graphite);margin-left:auto}

  /* grid */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem;margin:2.5rem 0 6rem}
  .bcard{display:flex;flex-direction:column;background:#fff;border:1px solid var(--stone);border-radius:6px;
    padding:1.9rem 1.75rem;text-decoration:none;color:inherit;position:relative;overflow:hidden;min-height:248px;
    transition:transform .4s cubic-bezier(.23,1,.32,1),box-shadow .4s,border-color .4s}
  .bcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--em),var(--saffron));transform:scaleX(0);transform-origin:left;transition:transform .45s cubic-bezier(.23,1,.32,1)}
  .bcard:hover{transform:translateY(-5px);box-shadow:0 22px 55px rgba(0,0,0,.09);border-color:rgba(15,91,79,.25)}
  .bcard:hover::before{transform:scaleX(1)}
  .bcard-tag{align-self:flex-start;font-size:.57rem;letter-spacing:.15em;text-transform:uppercase;background:var(--em);
    color:#fff;padding:.2rem .6rem;border-radius:2px;margin-bottom:1.15rem;font-weight:600}
  .bcard-title{font-family:var(--serif);font-size:1.4rem;line-height:1.2;color:var(--charcoal);margin-bottom:.7rem}
  .bcard-ex{font-size:.85rem;color:var(--graphite);line-height:1.65;flex:1}
  .bcard-meta{display:flex;align-items:center;gap:.55rem;margin-top:1.4rem;font-size:.69rem;letter-spacing:.04em;text-transform:uppercase;color:var(--graphite)}
  .bcard-dot{width:3px;height:3px;border-radius:50%;background:var(--saffron);flex-shrink:0}
  .bcard-read{margin-top:1.15rem;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--em);font-weight:600;display:inline-flex;align-items:center;gap:.4rem;transition:gap .3s}
  .bcard:hover .bcard-read{gap:.75rem}

  .empty{grid-column:1/-1;padding:3.5rem 2rem;border:1px dashed var(--stone);border-radius:6px;color:var(--graphite);background:rgba(255,255,255,.5);text-align:center}
  .empty strong{display:block;font-family:var(--serif);font-size:1.3rem;color:var(--charcoal);margin-bottom:.4rem;font-weight:400}

  footer{border-top:1px solid var(--stone);padding:2.5rem 0 3rem;color:var(--graphite);font-size:.8rem}
  footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem}
  footer a{color:var(--em);text-decoration:none}

  @media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}
  @media(max-width:600px){
    .grid{grid-template-columns:1fr}
    .bcard{min-height:auto;padding:1.5rem}
    .count{width:100%;margin:.5rem 0 0}
  }
</style>
</head>
<body>

<div class="topnav">
  <a class="wordmark" href="index.html">Growth Darji</a>
  <a class="backlink" href="index.html">&#8592; Back to site</a>
</div>

<div class="wrap">
  <section class="ihero">
    <span class="eyebrow">Insights</span>
    <h1 class="ititle">The <em>growth room,</em><br>in writing.</h1>
    <p class="iintro">Field notes on positioning, retention, and building consumer brands people return to — written by the operators, not ghostwriters. Filter by topic below.</p>
    <div class="chips" id="chips"></div>
  </section>

  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="wrap">
    <span>&copy; <span id="yr"></span> Growth Darji — Operators behind modern consumer growth.</span>
    <span><a href="index.html">growthdarji.com</a></span>
  </div>
</footer>

<script src="posts.js"></script>
<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  (function(){
    var grid  = document.getElementById('grid');
    var chips = document.getElementById('chips');
    function fmt(d){ try{ return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return d; } }
    function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

    var all = (window.POSTS || []).slice().sort(function(a,b){ return new Date(b.date) - new Date(a.date); });

    if(!all.length){
      chips.style.display = 'none';
      grid.innerHTML = '<div class="empty"><strong>First piece is on the way.</strong>New writing on brand, growth, and retention is coming soon.</div>';
      return;
    }

    // build unique topic list (preserving first-seen order)
    var topics = [];
    all.forEach(function(p){ if(p.topic && topics.indexOf(p.topic)===-1) topics.push(p.topic); });

    function card(p){
      var tag = p.topic ? '<span class="bcard-tag">'+esc(p.topic)+'</span>' : '';
      var meta = '<span>'+fmt(p.date)+'</span>' + (p.read ? '<span class="bcard-dot"></span><span>'+esc(p.read)+' read</span>' : '');
      return '<a class="bcard" href="'+esc(p.url)+'">'+tag+
             '<div class="bcard-title">'+esc(p.title)+'</div>'+
             '<div class="bcard-ex">'+esc(p.excerpt)+'</div>'+
             '<div class="bcard-meta">'+meta+'</div>'+
             '<span class="bcard-read">Read article \u2192</span></a>';
    }

    function render(filter){
      var list = (filter==='All') ? all : all.filter(function(p){ return p.topic===filter; });
      grid.innerHTML = list.map(card).join('');
      var c = document.querySelector('.count');
      if(c) c.textContent = list.length + (list.length===1 ? ' article' : ' articles');
    }

    // render chips
    var labels = ['All'].concat(topics);
    chips.innerHTML = labels.map(function(t,i){
      return '<button class="chip'+(i===0?' active':'')+'" data-topic="'+esc(t)+'">'+esc(t)+'</button>';
    }).join('') + '<span class="count"></span>';

    chips.addEventListener('click', function(e){
      var btn = e.target.closest('.chip');
      if(!btn) return;
      chips.querySelectorAll('.chip').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      render(btn.getAttribute('data-topic'));
    });

    render('All');
  })();
</script>
</body>
</html>
